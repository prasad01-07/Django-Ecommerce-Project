<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard - ShopEase Admin{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="d-flex" style="min-height: 100vh;">
        <nav class="bg-dark text-white" style="width: 250px; flex-shrink: 0;">
            <div class="p-3">
                <a href="{% url 'dashboard' %}" class="text-white text-decoration-none">
                    <h5><i class="bi bi-speedometer2"></i> ShopEase Admin</h5>
                </a>
            </div>
            <hr class="border-secondary my-0">
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link text-white" href="{% url 'dashboard' %}"><i class="bi bi-house"></i> Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="{% url 'admin_product_list' %}"><i class="bi bi-box"></i> Products</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="{% url 'admin_category_list' %}"><i class="bi bi-grid"></i> Categories</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="{% url 'admin_order_list' %}"><i class="bi bi-receipt"></i> Orders</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="{% url 'admin_user_list' %}"><i class="bi bi-people"></i> Users</a>
                </li>
            </ul>
            <hr class="border-secondary my-0">
            <ul class="nav flex-column mt-2">
                <li class="nav-item">
                    <a class="nav-link text-white" href="{% url 'index' %}"><i class="bi bi-shop"></i> View Site</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="{% url 'logout' %}"><i class="bi bi-box-arrow-left"></i> Logout</a>
                </li>
            </ul>
        </nav>
        <main class="flex-grow-1 p-4 bg-light">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
            {% block content %}{% endblock %}
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
